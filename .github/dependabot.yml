version: 2
updates:
  # Python backend
  - package-ecosystem: pip
    directory: /server
    schedule:
      interval: weekly
    groups:
      python-minor-patch:
        update-types:
          - minor
          - patch

  # Web frontend
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used in workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
