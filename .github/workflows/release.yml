name: Release
on:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  release:
    name: Tag and build image on version bump
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Check version and tag
        id: check
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          version=$(grep -m1 '^version = ' server/pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          tag="v${version}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists, skipping release"
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$tag"
          git -c http.extraheader="AUTHORIZATION: basic $(echo -n "x-access-token:${GH_TOKEN}" | base64)" push origin "$tag"
          echo "release=true" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: steps.check.outputs.release == 'true'
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Buildx
        if: steps.check.outputs.release == 'true'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        if: steps.check.outputs.release == 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        if: steps.check.outputs.release == 'true'
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.check.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        if: steps.check.outputs.release == 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CC_GIT_SHA=${{ github.sha }}

      - name: Notify addon repo of new release
        if: steps.check.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.ADDON_REPO_PAT }}
        run: |
          gh api --method POST \
            /repos/CatalogueCanvas/cataloguecanvas-homeassistant-addon/dispatches \
            -f event_type=cc-release \
            -f "client_payload[version]=${{ steps.check.outputs.tag }}"
